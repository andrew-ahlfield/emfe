name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gate:
    name: Lint · check · test · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync SvelteKit
        run: npm run prepare

      - name: Lint (prettier + eslint)
        run: npm run lint

      - name: Type-check (svelte-check)
        run: npm run check

      - name: Validate data
        run: npm run data:validate

      # The component tests run in real headless chromium (vite.config.ts sets
      # vitest's browser provider to playwright), so the browsers must be here
      # before `npm run test`, not just before the e2e step.
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Unit + component tests
        run: npm run test

      - name: Build
        run: npm run build

      - name: End-to-end tests
        run: npm run test:e2e
